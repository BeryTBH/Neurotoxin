name: Build IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check project
        run: |
          xcodebuild -version
          xcodebuild -list -project darksword-kexploit-fun.xcodeproj

      - name: Install dependencies
        run: pod install || true

      - name: Clean build folder
        run: rm -rf build

      - name: CI flag
        run: echo "CI=true" >> $GITHUB_ENV

      - name: Build archive
        run: |
          xcodebuild \
            -project darksword-kexploit-fun.xcodeproj \
            -scheme darksword-kexploit-fun \
            -configuration Release \
            -archivePath build/app.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Export IPA
        run: |
          mkdir -p build/ipa

          xcodebuild \
            -exportArchive \
            -archivePath build/app.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist || true

      - name: Upload app bundle (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: neurotoxin
          path: |
            build/app.xcarchive
            build/ipa
